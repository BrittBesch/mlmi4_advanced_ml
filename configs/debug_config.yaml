data:
  dataset: "omniglot"       # Critical: routes to get_omniglot_loader
  data_dir: "./data/omniglot"
  num_workers: 0            # Set to 0 to bypass multiprocessing overhead for a fast run
  
  train_params:
    n_episodes: 2           # Just enough to test the training loop and loss computation
    n_way: 5                # Lowered from 60 for instant batch construction
    n_shot: 5               
    n_query: 5
    
  val_params:
    n_episodes: 2           # Just enough to test the validation loop
    n_way: 5                
    n_shot: 1               
    n_query: 5              # Lowered from 15 to speed up evaluation
    
  test_params:
    n_episodes: 2           # Just enough to test the final 1000-episode test block
    n_way: 5                
    n_shot: 1               
    n_query: 5              # Lowered from 15

model_params:
  hidden_dim: 64
  dropblock_size: 0         
  dropblock_prob: 0.1

distance: "euclidean"       

# ---- Training & Logging Hyperparameters ----
lr: 0.001
lr_step: 2000
log_interval: 1             # Print metrics immediately after every episode
val_interval: 2             # Trigger validation exactly at the end of the 2 train episodes
output_dir: "./results/omniglot_debug"  # Isolate debug logs from your baseline results
seed: 42