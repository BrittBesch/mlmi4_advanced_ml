data:
  dataset: "speech"
  data_dir: "./data/speech"
  num_workers: 4
  
  train_params:
    n_episodes: 40000  # 200 epochs * 200 episodes 
    n_way: 4           # 4-way KWS benchmark 
    n_shot: 1          # 1-shot KWS benchmark
    n_query: 5         # 5 queries during training
    
  val_params:
    n_episodes: 100    # 100 validation episodes (Parnami)
    n_way: 4           
    n_shot: 1          
    n_query: 15        # Stricter evaluation 
    
  test_params:
    n_episodes: 100    # 100 test episodes (Parnami)
    n_way: 4           
    n_shot: 1          
    n_query: 15        

model_params:
  model_type: "c64"    # Toggle between "c64" and "tc_resnet8"
  hidden_dim: 64
  dropblock_size: 0    # DropBlock is vision-only, so keep these at 0 for the baseline
  dropblock_prob: 0.1

distance: "euclidean"       

# ---- Training & Logging Hyperparameters ----
lr: 0.001
lr_step: 4000               # Halves every 20 epochs (20 * 200)
log_interval: 200           # Log once per "epoch"
val_interval: 4000          # Validate right before the LR steps down
output_dir: "./results/speech_baseline"
seed: 42