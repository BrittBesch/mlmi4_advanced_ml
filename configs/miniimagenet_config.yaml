# ============================================================
# Baseline: miniImageNet 5-way 5-shot (Table 2 replication)
# ============================================================

# Top-level keys read by train_fewshot.py
seed: 42
lr: 0.001
lr_step: 2000
log_interval: 100
val_interval: 1000
output_dir: "results/mini_5way_5shot"

# Distance metric - read by Britt's build_distance()
# Options: "euclidean" (baseline), "diagonal", "lowrank"
distance: "euclidean"

# Data config - passed to Thao's get_dataloader(data_config, split)
data:
  dataset: "miniimagenet"
  data_dir: "./data/miniimagenet"
  n_way: 20              # train way (paper: 20 for 5-shot, 30 for 1-shot)
  n_shot: 5
  n_query: 15
  num_workers: 4
  use_cutout: false
  cutout_prob: 0.5
  train_params:
    n_episodes: 20000
  val_params:
    n_episodes: 600
  test_params:
    n_episodes: 1000

# Model config - read by train_fewshot.py
model_params:
  hidden_dim: 64
  dropblock_size: 0       # 0 = baseline, 5 = extension
  dropblock_prob: 0.1