# ============================================================
# Baseline: miniImageNet 5-way 5-shot (Table 2 replication)
# ============================================================

# Top-level keys read by train_fewshot.py
seed: 42
lr: 0.001
lr_step: 2000
log_interval: 100
val_interval: 1000
output_dir: "results/table2_1shot"

# Distance metric - read by Britt's build_distance()
# Options: "euclidean" (baseline), "diagonal", "lowrank"
distance: "euclidean"

# Data config - passed to Thao's get_dataloader(data_config, split)
data:
  dataset: "miniimagenet"
  data_dir: "./data/miniimagenet"
  num_workers: 4
  use_cutout: false
  cutout_prob: 0.0
  use_colour_jitter: false #calling this for my extension task
  train_params:
    n_episodes: 15000
    n_way: 5            # paper: 30-way training for 1-shot
    n_shot: 5
    n_query: 15
  val_params:
    n_episodes: 1000
    n_way: 5
    n_shot: 5
    n_query: 15
  test_params:
    n_episodes: 1000       # paper: 600 test episodes
    n_way: 5               # paper: 5-way test
    n_shot: 5              # match train shot
    n_query: 15

model_params:
  hidden_dim: 64
  dropblock_size: 0
  dropblock_prob: 0
  backbone: "conv4" # Options: "conv4", "resnet18"




